# Render Blueprint — deploys the web service + a free PostgreSQL database together.
# In Render: New + → Blueprint → connect this repo. Render reads this file automatically.
services:
  - type: web
    name: quickservice-bd
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: quickservice-db
          property: connectionString

databases:
  - name: quickservice-db
    plan: free
