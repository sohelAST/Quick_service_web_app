{% extends "base.html" %}
{% block content %}
<div class="topbar"><div class="hello"><small><a href="/" style="color:var(--primary);font-weight:700;"><i class="ti ti-arrow-left" style="vertical-align:-2px;"></i> Back</a></small><h1>Book {{ service }}</h1></div></div>
<div style="max-width:540px;">
  <div class="card">
    <form method="post" action="/book">
      <input type="hidden" name="service" value="{{ service }}">
      <label style="font-weight:700;font-size:14px;display:block;margin-bottom:8px;">Choose Worker</label>
      <select class="input" name="worker" required>
        {% for w in workers %}<option value="{{ w.name }}">{{ w.name }} — {{ w.role }} (⭐{{ w.rating }})</option>{% endfor %}
      </select>
      <label style="font-weight:700;font-size:14px;display:block;margin-bottom:8px;">Your Address</label>
      <input class="input" name="address" placeholder="House, Road, Area, Dhaka" required>
      <label style="font-weight:700;font-size:14px;display:block;margin-bottom:8px;">Preferred Date</label>
      <input class="input" name="date" type="date" required>
      <button class="btn btn-block" style="margin-top:10px;">Confirm Booking</button>
    </form>
  </div>
</div>
{% endblock %}
