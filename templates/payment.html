{% extends "base.html" %}
{% block content %}
<div class="topbar"><div class="hello"><small><a href="/bookings" style="color:var(--primary);font-weight:700;"><i class="ti ti-arrow-left" style="vertical-align:-2px;"></i> Bookings</a></small><h1>Payment 💳</h1></div></div>
<div style="max-width:580px;">
  <div style="background:var(--grad);border-radius:var(--radius);padding:30px;text-align:center;margin-bottom:24px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden;">
    <div style="position:absolute;right:-30px;top:-30px;width:140px;height:140px;background:rgba(255,255,255,.1);border-radius:50%;"></div>
    <p style="opacity:.9;font-size:14px;position:relative;">{{ booking["service"] }}</p>
    <h1 style="font-size:44px;font-weight:800;margin:8px 0;position:relative;">৳{{ booking["amount"] }}</h1>
    <p style="opacity:.9;font-size:13px;position:relative;">Worker: {{ booking["worker"] }}</p>
  </div>
  <div class="section-title">Select Payment Method</div>
  <form method="post" action="/payment/{{ booking['id'] }}">
    {% for m in methods %}
    <label class="card card-hover" style="display:flex;align-items:center;gap:16px;margin-bottom:12px;cursor:pointer;">
      <div style="width:52px;height:52px;background:{{ m.color }}1A;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;">{{ m.icon }}</div>
      <div style="flex:1;"><h4 style="font-size:15.5px;font-weight:800;color:{{ m.color }};">{{ m.name }}</h4>
        <p style="color:var(--text-light);font-size:12px;font-weight:500;">{{ m.desc }}</p></div>
      <input type="radio" name="method" value="{{ m.name }}" required style="width:20px;height:20px;accent-color:var(--primary);">
    </label>
    {% endfor %}
    <button class="btn btn-block" style="margin-top:12px;">Confirm Payment</button>
  </form>
</div>
{% endblock %}
