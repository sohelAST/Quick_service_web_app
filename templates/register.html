{% extends "base.html" %}
{% block auth %}
<div style="min-height:100vh;display:flex;">
  <div style="flex:1;background:var(--grad);display:flex;flex-direction:column;justify-content:center;padding:64px;color:#fff;position:relative;overflow:hidden;">
    <div style="position:absolute;right:-80px;top:-80px;width:300px;height:300px;background:rgba(255,255,255,.08);border-radius:50%;"></div>
    <div style="width:56px;height:56px;background:rgba(255,255,255,.18);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:24px;position:relative;"><i class="ti ti-sparkles"></i></div>
    <h1 style="font-size:42px;font-weight:800;line-height:1.15;letter-spacing:-1px;position:relative;">Join<br>QuickService BD.</h1>
    <p style="opacity:.9;margin-top:18px;font-size:16px;max-width:380px;position:relative;">Sign up as a customer to book services, or as a worker to start earning.</p>
  </div>
  <div style="width:500px;display:flex;align-items:center;justify-content:center;padding:40px;background:#fff;overflow-y:auto;">
    <div style="width:100%;max-width:350px;">
      <h2 style="font-size:28px;font-weight:800;letter-spacing:-.5px;">Create Account</h2>
      <p style="color:var(--text-light);margin:8px 0 24px;font-weight:500;">Get started in seconds</p>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      <form method="post" action="/register">
        <input class="input" name="name" placeholder="Full Name" required>
        <input class="input" name="email" type="email" placeholder="Email" required>
        <input class="input" name="phone" placeholder="Phone (+8801...)" required>
        <input class="input" name="password" type="password" placeholder="Password" required>
        <label style="font-weight:700;font-size:14px;display:block;margin-bottom:8px;">I want to join as</label>
        <div style="display:flex;gap:10px;margin-bottom:14px;">
          <label style="flex:1;border:1.5px solid var(--border);border-radius:13px;padding:12px;text-align:center;cursor:pointer;font-weight:700;font-size:14px;">
            <input type="radio" name="role" value="customer" checked onclick="document.getElementById('prof').style.display='none'"> 👤 Customer</label>
          <label style="flex:1;border:1.5px solid var(--border);border-radius:13px;padding:12px;text-align:center;cursor:pointer;font-weight:700;font-size:14px;">
            <input type="radio" name="role" value="worker" onclick="document.getElementById('prof').style.display='block'"> 👷 Worker</label>
        </div>
        <select class="input" name="profession" id="prof" style="display:none;">
          <option value="">Select your profession</option>
          <option>Plumbing</option><option>Electrician</option><option>AC Repair</option>
          <option>Tub-well</option><option>Water Pump</option><option>Cleaning</option><option>Carpenter</option>
        </select>
        <button class="btn btn-block" style="margin-top:4px;">Sign Up</button>
      </form>
      <p style="text-align:center;margin-top:20px;color:var(--text-light);font-size:14px;font-weight:500;">
        Already have an account? <a href="/login" style="color:var(--primary);font-weight:700;">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
